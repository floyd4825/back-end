<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Industrial & Domestic Cleaning Solutions</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            color: #111;
            border-radius: 18px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
            padding: 32px;
            border-top: 5px solid #ff6b6b;
        }
        
        .card::before {
            content: "";
            display: block;
            width: 100%;
            height: 60px;
            margin: -32px -32px 20px -32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 13px 13px 0 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="50" font-size="40" fill="white" text-anchor="middle" dominant-baseline="middle">🧼</text></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 50px;
        }
        
        .title {
            margin: 0 0 12px;
            font-size: 1.9rem;
            color: #667eea;
        }
        
        .subtitle {
            margin: 0 0 24px;
            color: #4b5563;
        }
        
        .field {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        button:hover {
            background: #1d4ed8;
        }
        
        .small-text {
            margin: 14px 0 0;
            color: #6b7280;
            font-size: 0.95rem;
        }
        
        .link {
            color: #2563eb;
            text-decoration: none;
        }
        
        .footer {
            margin-top: 22px;
            text-align: center;
            color: #d1d5db;
            font-size: 0.95rem;
        }
        
        .notice {
            margin-top: 12px;
            padding: 12px;
            background: #f8fafc;
            color: #111827;
            border-radius: 10px;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Cleaning Solutions</h1>
            <p class="subtitle">Customer Portal</p>

            <form id="login-form" method="post" action="#">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div id="login-error" class="notice" style="display:none; color:#b91c1c; background:#fee2e2; border-color:#fecaca;"></div>
                <button type="submit">Login</button>
            </form>

            <p class="small-text">Don't have an account? <a class="link" href="register.html">Register here</a></p>
            <div class="notice">
                Demo credentials: Register a customer or use the admin login page for admin access.
            </div>
            <p class="footer"><a class="link" href="Untitled-7.html">Back to Home</a></p>
        </div>
    </div>
    <script src="auth.js" defer></script>
</body>

</html>
