<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Industrial & Domestic Cleaning Solutions</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            color: #111;
            border-radius: 18px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
            padding: 32px;
            border-top: 5px solid #667eea;
        }
        
        .title {
            margin: 0 0 12px;
            font-size: 1.9rem;
            color: #667eea;
        }
        
        .subtitle {
            margin: 0 0 24px;
            color: #4b5563;
        }
        
        .field {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        button:hover {
            background: #1d4ed8;
        }
        
        .small-text {
            margin: 16px 0 0;
            color: #6b7280;
            font-size: 0.95rem;
        }
        
        .link {
            color: #2563eb;
            text-decoration: none;
        }
        
        .footer {
            margin-top: 22px;
            text-align: center;
            color: #d1d5db;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Cleaning Solutions</h1>
            <p class="subtitle">Create Your Account</p>

            <form id="register-form" method="post" action="#">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="field">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" placeholder="John">
                </div>
                <div class="field">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Doe">
                </div>
                <div class="field">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" name="company_name" placeholder="Your Company">
                </div>
                <div class="field">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
                </div>
                <div id="register-error" class="notice" style="display:none; color:#b91c1c; background:#fee2e2; border-color:#fecaca;"></div>

                <button type="submit">Create Account</button>
            </form>

            <p class="small-text">Already have an account? <a class="link" href="login.html">Login here</a></p>
            <p class="footer"><a class="link" href="Untitled-7.html">Back to Home</a></p>
        </div>
    </div>
    <script src="auth.js" defer></script>
</body>

</html>
